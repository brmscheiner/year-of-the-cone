backend:
  name: git-gateway
  branch: main

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: "general"
    label: "🌍 Trip Info"
    files:
      - name: "index"
        label: "General Settings"
        file: "src/content/general/index.yaml"
        fields:
          - label: "Your Name"
            name: "travelerName"
            widget: "string"
            hint: "Your first name (shown in the browser tab)"
          - label: "Page Title"
            name: "title"
            widget: "string"
            hint: "The big title at the top of the page"
          - label: "Tagline"
            name: "tagline"
            widget: "string"
            hint: "Short subtitle under the title"
          - label: "Current Location"
            name: "currentLocation"
            widget: "string"
            hint: "Where you are right now, e.g. Portland, Oregon"
          - label: "Social Links"
            name: "socialLinks"
            widget: "object"
            fields:
              - label: "Instagram URL"
                name: "instagram"
                widget: "string"
                required: false
                hint: "Leave blank to hide"
              - label: "TikTok URL"
                name: "tiktok"
                widget: "string"
                required: false
                hint: "Leave blank to hide"
              - label: "YouTube URL"
                name: "youtube"
                widget: "string"
                required: false
                hint: "Leave blank to hide"
              - label: "Patreon URL"
                name: "patreon"
                widget: "string"
                required: false
                hint: "Leave blank to hide"
              - label: "Substack URL"
                name: "substack"
                widget: "string"
                required: false
                hint: "Leave blank to hide"
              - label: "GoFundMe URL"
                name: "gofundme"
                widget: "string"
                required: false
                hint: "Leave blank to hide"

  - name: "counters"
    label: "🎮 Counters"
    files:
      - name: "index"
        label: "Travel Counters"
        file: "src/content/counters/index.yaml"
        fields:
          - label: "Counters"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}: {{fields.value}}"
            fields:
              - label: "Label"
                name: "label"
                widget: "string"
                hint: "e.g. Hotel Check-ins"
              - label: "Count"
                name: "value"
                widget: "number"
                value_type: "int"
                min: 0

  - name: "inventory"
    label: "🌲 Cone Inventory"
    files:
      - name: "index"
        label: "Species List"
        file: "src/content/inventory/index.yaml"
        fields:
          - label: "Species"
            name: "items"
            widget: "list"
            summary: "{{fields.common}} ({{fields.date}})"
            fields:
              - label: "Common Name"
                name: "common"
                widget: "string"
              - label: "Scientific Name"
                name: "scientific"
                widget: "string"
              - label: "Date Found"
                name: "date"
                widget: "string"
                hint: "e.g. March 2"
              - label: "Location"
                name: "location"
                widget: "string"
                hint: "e.g. Santa Fe, NM"
              - label: "Notes"
                name: "notes"
                widget: "text"
                required: false
              - label: "YouTube URL"
                name: "youtube"
                widget: "string"
                required: false
