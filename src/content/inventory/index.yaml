- id: index
  items:
    - common: 'Douglas Fir'
      scientific: 'Pseudotsuga menziesii'
      date: 'March 2'
      location: 'Santa Fe, NM'
      notes: >-
        Had to fight a badger for this one. Literally squared up with a honey badger
        at the base of the tree while trying to collect a cone. It hissed, I hissed back,
        and we both walked away with our dignity mostly intact.


        The tree itself was stunning — about 200 feet tall with deeply furrowed bark.
        Found it on a ridge trail just outside town. The three-pronged bracts on the
        cones are unmistakable once you know what to look for.
      youtube: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

    - common: 'Ponderosa Pine'
      scientific: 'Pinus ponderosa'
      date: 'March 8'
      location: 'Flagstaff, AZ'
      notes: >-
        Bark smelled like butterscotch in the sun. Pressed my nose right up against
        the cracks in the bark plates and just stood there breathing it in for a solid
        five minutes. A couple of hikers walked by and gave me a look.


        This grove was at about 7,000 feet elevation on the outskirts of town.
        The puzzle-piece bark pattern on the older trees is incredible — orange and
        black plates that look like they were hand-painted. Collected three cones,
        all in great shape.
      youtube: 'https://www.youtube.com/watch?v=dQw4w9WgXcQ'

    - common: 'Western Red Cedar'
