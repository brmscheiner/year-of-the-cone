      date: 'March 15'
      location: 'Olympic National Park, WA'

    - common: 'Sitka Spruce'
      scientific: 'Picea sitchensis'
      date: 'March 21'
      location: 'Cannon Beach, OR'
      notes: >-
        Absolutely massive specimen right off the trail. The trunk was easily
        ten feet in diameter. Needles are sharp and stiff — learned that the hard
        way grabbing a branch without gloves.


        Spent about an hour sketching it in the field journal. The fog was rolling
        in off the coast and wrapping around the canopy in a way that made the
        whole forest feel like a cathedral. One of those moments where you just
        stop and sit for a while.

